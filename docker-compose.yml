services:
  rota:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rota
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8000}:8000" # the proxy
      - "${API_PORT:-8001}:8001"   # REST API + dashboard UI (same origin)
    environment:
      - PROXY_PORT=8000
      - API_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DB_HOST=${DB_HOST:-timescaledb}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-rota}
      - DB_PASSWORD=${DB_PASSWORD:-rota_password}
      - DB_NAME=${DB_NAME:-rota}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - ROTA_ADMIN_USER=${ROTA_ADMIN_USER:-admin}
      - ROTA_ADMIN_PASSWORD=${ROTA_ADMIN_PASSWORD:-admin}
      # Set a stable value in production so dashboard sessions survive restarts.
      - JWT_SECRET=${JWT_SECRET:-}
      # Event store: "postgres" (default) keeps logs + request history in the
      # primary database; "clickhouse" moves them to the clickhouse service
      # (start it with: docker compose --profile clickhouse up -d).
      - EVENT_STORE=${EVENT_STORE:-postgres}
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:-clickhouse}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:-9000}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-rota}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-rota_password}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-rota}
    networks:
      - rota-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "-O",
          "/dev/null",
          "http://localhost:8001/health",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      timescaledb:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:2.22.1-pg17
    container_name: rota-timescaledb
    restart: unless-stopped
    # Port intentionally NOT exposed to host — DB is internal only.
    environment:
      - POSTGRES_USER=${DB_USER:-rota}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-rota_password}
      - POSTGRES_DB=${DB_NAME:-rota}
      - TIMESCALEDB_TELEMETRY=off
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    networks:
      - rota-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rota} -d ${DB_NAME:-rota}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # Optional event-store backend — only starts with the "clickhouse" profile:
  #   EVENT_STORE=clickhouse docker compose --profile clickhouse up -d
  # rota fail-fasts and restarts until ClickHouse is healthy on first boot.
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: rota-clickhouse
    restart: unless-stopped
    profiles: [clickhouse]
    # Port intentionally NOT exposed to host — internal only.
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-rota}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-rota_password}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-rota}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - rota-network
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # ClickHouse sizes itself to the machine by default; on small VMs cap it,
    # e.g. add:  mem_limit: 1g
    healthcheck:
      test:
        [
          "CMD",
          "clickhouse-client",
          "--user", "${CLICKHOUSE_USER:-rota}",
          "--password", "${CLICKHOUSE_PASSWORD:-rota_password}",
          "-q", "SELECT 1",
        ]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  timescaledb-data:
    driver: local
  clickhouse-data:
    driver: local

networks:
  rota-network:
    driver: bridge
