name: CI

on:
  push:
    branches: [main]
  pull_request:

# One run per ref; cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (Go, ${{ matrix.database }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    # The event store must work on plain Postgres AND TimescaleDB — the
    # integration/conformance suites run against both.
    strategy:
      fail-fast: false
      matrix:
        database:
          - postgres:17-alpine
          - timescale/timescaledb:2.22.1-pg17

    services:
      database:
        image: ${{ matrix.database }}
        env:
          POSTGRES_USER: rota
          POSTGRES_PASSWORD: rota_password
          POSTGRES_DB: rota_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rota -d rota_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean. Run 'gofmt -w .' in core/:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (hermetic, race detector)
        run: go test -race ./...

      # -p 1 because the integration packages share one test database and Go
      # runs package tests in parallel by default (see the suites' doc
      # comments); -count=1 defeats caching so both matrix legs really run.
      - name: Integration tests (${{ matrix.database }})
        env:
          ROTA_TEST_DB: "1"
          TEST_DB_HOST: localhost
          TEST_DB_PORT: "5432"
          TEST_DB_USER: rota
          TEST_DB_PASSWORD: rota_password
          TEST_DB_NAME: rota_test
        run: go test -race -p 1 -count=1 -run Integration ./internal/events/ ./internal/repository/

  events-clickhouse:
    name: Event store (ClickHouse)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core

    services:
      clickhouse:
        image: clickhouse/clickhouse-server:25.3
        env:
          CLICKHOUSE_USER: rota
          CLICKHOUSE_PASSWORD: rota_password
          CLICKHOUSE_DB: rota_test
        ports:
          - 9000:9000
        options: >-
          --health-cmd "clickhouse-client --user rota --password rota_password -q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --ulimit nofile=262144:262144

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      # The same conformance suite the Postgres matrix runs, pointed at the
      # ClickHouse backend via EVENT_STORE_TEST.
      - name: Conformance suite (ClickHouse)
        env:
          ROTA_TEST_DB: "1"
          EVENT_STORE_TEST: clickhouse
          TEST_CH_HOST: localhost
          TEST_CH_PORT: "9000"
          TEST_CH_USER: rota
          TEST_CH_PASSWORD: rota_password
          TEST_CH_NAME: rota_test
        run: go test -race -count=1 -run Integration ./internal/events/

  dashboard:
    name: Dashboard (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (typecheck + bundle)
        run: pnpm build
